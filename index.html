<head>

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#040608',
                        primary: '#10b981',
                        primary_dark: '#059669',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    animation: {
                        'blob': 'blob 12s infinite cubic-bezier(0.4, 0, 0.2, 1) alternate',
                        'blob-reverse': 'blob 16s infinite cubic-bezier(0.4, 0, 0.2, 1) alternate-reverse',
                        'float': 'float 6s ease-in-out infinite',
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards'
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)', opacity: 0.8 },
                            '33%': { transform: 'translate(40px, -60px) scale(1.1)', opacity: 1 },
                            '66%': { transform: 'translate(-30px, 30px) scale(0.9)', opacity: 0.6 },
                            '100%': { transform: 'translate(0px, 0px) scale(1)', opacity: 0.8 }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-8px)' }
                        },
                        fadeInUp: {
                            '0%': { opacity: 0, transform: 'translateY(20px) scale(0.98)' },
                            '100%': { opacity: 1, transform: 'translateY(0) scale(1)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Modern Dinamik Tema Değişkenleri */
        :root {
            --bg-color: #f1f5f9; /* Slate 100 */
            --text-color: #0f172a; /* Slate 900 */
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(0, 0, 0, 0.05);
            --glass-shadow: 0 16px 40px rgba(0, 0, 0, 0.06);
            --glass-surface-bg: rgba(255, 255, 255, 0.55);
            --glass-surface-border: rgba(0, 0, 0, 0.04);
            --blob-1: rgba(16, 185, 129, 0.15); /* Emerald */
            --blob-2: rgba(59, 130, 246, 0.15); /* Blue */
        }

        .dark {
            --bg-color: #040608;
            --text-color: #ffffff;
            --glass-bg: rgba(18, 24, 34, 0.4);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
            --glass-surface-bg: rgba(30, 40, 54, 0.3);
            --glass-surface-border: rgba(255, 255, 255, 0.04);
            --blob-1: rgba(16, 185, 129, 0.08);
            --blob-2: rgba(59, 130, 246, 0.06);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.4s ease, color 0.4s ease;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -10;
        }

        .blob-1 {
            position: absolute;
            top: -10%;
            left: -5%;
            width: 55vw;
            height: 55vw;
            background: radial-gradient(circle, var(--blob-1) 0%, transparent 60%);
            border-radius: 50%;
            filter: blur(90px);
            transition: background 0.4s ease;
        }

        .blob-2 {
            position: absolute;
            bottom: -15%;
            right: -5%;
            width: 65vw;
            height: 65vw;
            background: radial-gradient(circle, var(--blob-2) 0%, transparent 60%);
            border-radius: 50%;
            filter: blur(100px);
            transition: background 0.4s ease;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .glass-surface {
            background: var(--glass-surface-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-surface-border);
            transition: background 0.4s ease, border-color 0.4s ease;
        }

        .premium-border {
            position: relative;
            z-index: 1;
        }

        .premium-border::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.4), rgba(59, 130, 246, 0.1));
            border-radius: inherit;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .premium-border:hover::before {
            opacity: 1;
        }

        input[type="number"],
        input[type="text"],
        input[type="password"],
        select {
            font-size: 14px !important;
            background: transparent;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {

            -moz-appearance: none;

            font-family: 'JetBrains Mono', monospace;

<body>

    <div class="ambient-bg">
        <div class="blob-1 animate-blob"></div>
        <div class="blob-2 animate-blob-reverse"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, AreaChart, Area, PieChart, Pie, Cell } = window.Recharts;

        // --- INDEXEDDB KURULUMU ---
        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('GoldHistoryDB', 1);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('rates')) {
                        const store = db.createObjectStore('rates', { keyPath: 'timestamp' });
                        store.createIndex('timestamp', 'timestamp', { unique: true });
                    }
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const saveRateToDB = async (xau, gram) => {
            try {
                const db = await initDB();
                const tx = db.transaction('rates', 'readwrite');
                const store = tx.objectStore('rates');
                store.put({ timestamp: Date.now(), xau, gram });
            } catch (e) {
                console.error("DB Save Error:", e);
            }
        };

        const getRatesFromDB = async (startTime) => {
            return new Promise(async (resolve, reject) => {
                try {
                    const db = await initDB();
                    const tx = db.transaction('rates', 'readonly');
                    const store = tx.objectStore('rates');
                    const index = store.index('timestamp');
                    const range = IDBKeyRange.lowerBound(startTime);
                    const request = index.getAll(range);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                } catch (e) {
                    reject(e);
                }
            });
        };

        const formatTitleCase = (str) => {
            if (!str) return 'TL';
            return String(str).split(/[\s_-]+/).map(word => {
                if (!word) return '';
                return word.charAt(0).toLocaleUpperCase('tr-TR') + word.slice(1).toLocaleLowerCase('tr-TR');
            }).join(' ');
        };

        // --- ALTIN GEÇMİŞİ LİVE CHART BİLEŞENİ ---
        const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
                return (
                    <div className="glass-surface p-3 rounded-xl shadow-lg border border-black/10 dark:border-white/10 backdrop-blur-xl">
                        <p className="text-[10px] text-slate-500 dark:text-zinc-400 font-bold mb-1 uppercase tracking-widest">{payload[0].payload.fullDate || label}</p>
                        <p className="text-sm font-black text-emerald-600 dark:text-emerald-400 font-numbers tracking-tight">
                            {new Intl.NumberFormat('tr-TR').format(payload[0].value)} {payload[0].name === 'Gram' ? '₺' : '$'}
                        </p>
                    </div>
                );
            }
            return null;
        };

        const GoldHistoryChart = () => {
            const [data, setData] = useState([]);
            const [timeRange, setTimeRange] = useState('1H');
            const [activeTab, setActiveTab] = useState('GRAM');
            
            const fetchData = async () => {
                const now = Date.now();
                let startTime = 0;
                switch (timeRange) {
                    case '1H': startTime = now - 60 * 60 * 1000; break;
                    case '1D': startTime = now - 24 * 60 * 60 * 1000; break;
                    case '1W': startTime = now - 7 * 24 * 60 * 60 * 1000; break;
                    case '1M': startTime = now - 30 * 24 * 60 * 60 * 1000; break;
                    case '1Y': startTime = now - 365 * 24 * 60 * 60 * 1000; break;
                    case 'ALL': startTime = 0; break;
                }
                
                try {
                    const results = await getRatesFromDB(startTime);
                    let sampled = results;
                    const maxPoints = 200;
                    if (results.length > maxPoints) {
                        const step = Math.ceil(results.length / maxPoints);
                        sampled = results.filter((_, i) => i % step === 0);
                    }
                    if (results.length > 0 && sampled[sampled.length - 1] !== results[results.length - 1]) {
                        sampled.push(results[results.length - 1]);
                    }
                    
                    const formatted = sampled.map(d => {
                        const date = new Date(d.timestamp);
                        let timeStr = date.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: timeRange === '1H' ? '2-digit' : undefined });
                        if (['1W', '1M', '1Y', 'ALL'].includes(timeRange)) {
                            timeStr = date.toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' }) + ' ' + timeStr;
                        }
                        return {
                            time: timeStr,
                            gram: d.gram,
                            xau: d.xau,
                            fullDate: date.toLocaleString('tr-TR')
                        };
                    });
                    setData(formatted);
                } catch (e) {
                    console.error("Fetch chart data failed", e);
                }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 2000);
                return () => clearInterval(interval);
            }, [timeRange]);

            return (
                <div className="mb-10 max-w-4xl mx-auto glass-card p-4 sm:p-6 rounded-[2rem] animate-fade-in-up" style={{ animationDelay: '0.05s' }}>
                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                        <div className="flex bg-black/5 dark:bg-white/5 p-1 rounded-xl w-full md:w-auto">
                            <button onClick={() => setActiveTab('GRAM')} className={`flex-1 md:flex-none px-4 py-2 rounded-lg text-xs font-bold transition-all ${activeTab === 'GRAM' ? 'bg-white dark:bg-zinc-800 text-emerald-600 dark:text-emerald-400 shadow-sm' : 'text-slate-500 dark:text-zinc-400 hover:text-slate-800 dark:hover:text-white'}`}>Fiziki Gram</button>
                            <button onClick={() => setActiveTab('XAU')} className={`flex-1 md:flex-none px-4 py-2 rounded-lg text-xs font-bold transition-all ${activeTab === 'XAU' ? 'bg-white dark:bg-zinc-800 text-emerald-600 dark:text-emerald-400 shadow-sm' : 'text-slate-500 dark:text-zinc-400 hover:text-slate-800 dark:hover:text-white'}`}>Ons ($)</button>
                        </div>
                        <div className="flex bg-black/5 dark:bg-white/5 p-1 rounded-xl w-full md:w-auto">
                            {['1H', '1D', '1W', '1M', '1Y', 'ALL'].map(t => (
                                <button key={t} onClick={() => setTimeRange(t)} className={`flex-1 md:flex-none px-2 sm:px-3 py-1.5 rounded-lg text-[9px] sm:text-[10px] font-bold transition-all ${timeRange === t ? 'bg-white dark:bg-zinc-800 text-slate-800 dark:text-white shadow-sm' : 'text-slate-500 dark:text-zinc-400 hover:text-slate-800 dark:hover:text-white'}`}>
                                    {t === '1H' ? '1S' : t === '1D' ? '1G' : t === '1W' ? '1H' : t === '1M' ? '1A' : t === '1Y' ? '1Y' : 'TÜMÜ'}
                                </button>
                            ))}
                        </div>
                    </div>
                    
                    <div className="h-[250px] sm:h-[300px] w-full">
                        <ResponsiveContainer width="100%" height="100%">
                            <AreaChart data={data} margin={{ top: 10, right: 0, left: -20, bottom: 0 }}>
                                <defs>
                                    <linearGradient id="colorValue" x1="0" y1="0" x2="0" y2="1">
                                    <stop offset="5%" stopColor="#10b981" stopOpacity={0.4}/>
                                    <stop offset="95%" stopColor="#10b981" stopOpacity={0}/>
                                    </linearGradient>
                                </defs>
                                <CartesianGrid strokeDasharray="3 3" stroke="currentColor" className="text-black/5 dark:text-white/5" vertical={false} />
                                <XAxis dataKey="time" axisLine={false} tickLine={false} tick={{ fontSize: 9, fill: 'currentColor' }} className="text-slate-400 dark:text-zinc-500 font-numbers" minTickGap={30} />
                                <YAxis domain={['auto', 'auto']} axisLine={false} tickLine={false} tick={{ fontSize: 10, fill: 'currentColor' }} className="text-slate-400 dark:text-zinc-500 font-numbers" tickFormatter={(val) => new Intl.NumberFormat('tr-TR').format(val)} />
                                <Tooltip content={<CustomTooltip />} />
                                <Area type="monotone" dataKey={activeTab === 'GRAM' ? 'gram' : 'xau'} name={activeTab === 'GRAM' ? 'Gram' : 'Ons'} stroke="#10b981" strokeWidth={3} fillOpacity={1} fill="url(#colorValue)" isAnimationActive={false} />
                            </AreaChart>
                        </ResponsiveContainer>
                    </div>
                </div>
            );
        };

        // --- CUSTOM SELECT BİLEŞENİ ---
        const CustomSelect = ({ value, options, onChange, className }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [coords, setCoords] = useState(null);
            const dropdownRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        if (!event.target.closest('.custom-select-portal')) {
                            setIsOpen(false);
                        }
                    }
                };

                const handleScroll = (e) => {
                    if (isOpen && !e.target.closest('.custom-select-portal')) {
                        setIsOpen(false);
                    }
                };

                if (isOpen) {
                    if (dropdownRef.current) {
                        const rect = dropdownRef.current.getBoundingClientRect();
                        const estimatedHeight = Object.keys(options).length * 36;
                        const spaceBelow = window.innerHeight - rect.bottom;
                        const spaceAbove = rect.top;
                        const direction = (spaceBelow < estimatedHeight + 20 && spaceAbove > spaceBelow) ? 'up' : 'down';

                        setCoords({
                            right: window.innerWidth - rect.right,
                            top: rect.bottom + 5,
                            bottom: window.innerHeight - rect.top + 5,
                            width: rect.width,
                            direction
                        });
                    }
                    document.addEventListener("mousedown", handleClickOutside);
                    window.addEventListener("scroll", handleScroll, true);
                }
                return () => {
                    document.removeEventListener("mousedown", handleClickOutside);
                    window.removeEventListener("scroll", handleScroll, true);
                };
            }, [isOpen, options]);

            const portalContent = isOpen && coords ? ReactDOM.createPortal(
                <div
                    className="custom-select-portal fixed bg-white dark:bg-zinc-900 border border-slate-200 dark:border-white/20 rounded-xl shadow-2xl z-[999999] overflow-hidden py-1.5 animate-fade-in-up"
                    style={{
                        right: coords.right + 'px',
                        top: coords.direction === 'up' ? 'auto' : coords.top + 'px',
                        bottom: coords.direction === 'up' ? coords.bottom + 'px' : 'auto',
                        minWidth: Math.max(120, coords.width) + 'px'
                    }}
                >
                    {Object.entries(options).map(([key, label]) => (
                        <div
                            key={key}
                            onClick={(e) => { e.stopPropagation(); onChange(key); setIsOpen(false); }}
                            className={`px-4 py-2.5 text-[11px] font-bold text-center cursor-pointer transition-colors ${value === key ? 'bg-emerald-500/10 text-emerald-600 dark:bg-emerald-500/20 dark:text-emerald-400' : 'text-slate-600 dark:text-zinc-300 hover:bg-black/5 dark:hover:bg-white/10 hover:text-slate-900 dark:hover:text-white'}`}
                        >
                            {formatTitleCase(label)}
                        </div>
                    ))}
                </div>,
                document.body
            ) : null;

            return (
                <div ref={dropdownRef} className={`relative flex ${className}`} onClick={(e) => e.stopPropagation()}>
                    <div
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full h-full flex items-center justify-center cursor-pointer px-1 sm:px-2 text-[9px] sm:text-[10px] font-bold outline-none no-arrow hover:bg-black/5 dark:hover:bg-white/5 transition-colors whitespace-nowrap"
                    >
                        {formatTitleCase(options[value] || value)}
                    </div>
                    {portalContent}
                </div>
            );
        };

        const useDebounce = (callback, delay) => {
            const timeoutRef = useRef(null);
            return (...args) => {
                if (timeoutRef.current) clearTimeout(timeoutRef.current);
                timeoutRef.current = setTimeout(() => {
                    callback(...args);
                }, delay);
            };
        };

        const DebouncedInput = ({ value, onChange, delay = 500, as = "input", ...props }) => {
            const [localValue, setLocalValue] = useState(value);
            useEffect(() => { setLocalValue(value); }, [value]);

            useEffect(() => {
                const handler = setTimeout(() => {
                    if (localValue !== value) onChange(localValue);
                }, delay);
                return () => clearTimeout(handler);
            }, [localValue]);

            const Component = as;
            return (
                <Component
                    {...props}
                    value={localValue}
                    onChange={(e) => setLocalValue(e.target.value)}
                    onBlur={() => { if (localValue !== value) onChange(localValue); }}
                />
            );
        };

        // --- GRAFİK BİLEŞENİ (Dairesel Dağılım) ---
        const ChartLegend = ({ distribution }) => {
            if (!distribution || distribution.length === 0) return null;
            const colors = ['#10b981', '#3b82f6', '#f59e0b', '#8b5cf6', '#ef4444', '#06b6d4', '#ec4899', '#14b8a6', '#f97316', '#6366f1'];

            return (
                <div className="mb-10 max-w-4xl mx-auto glass-card p-6 rounded-[2rem] flex flex-col md:flex-row items-center justify-center gap-8 md:gap-16 animate-fade-in-up" style={{ animationDelay: '0.1s' }}>
                    <div className="relative w-56 h-56 sm:w-64 sm:h-64 shrink-0">
                        <ResponsiveContainer width="100%" height="100%">
                            <PieChart>
                                <Pie 
                                    data={distribution} 
                                    cx="50%" 
                                    cy="50%" 
                                    innerRadius="65%" 
                                    outerRadius="90%" 
                                    paddingAngle={3}
                                    dataKey="value"
                                    stroke="transparent"
                                >
                                    {distribution.map((entry, index) => (
                                        <Cell key={`cell-${index}`} fill={colors[index % colors.length]} className="drop-shadow-sm hover:opacity-80 transition-opacity" />
                                    ))}
                                </Pie>
                                <Tooltip 
                                    contentStyle={{ borderRadius: '12px', border: 'none', background: 'rgba(255,255,255,0.9)', backdropFilter: 'blur(10px)', color: '#1e293b', fontWeight: 'bold' }}
                                    itemStyle={{ fontWeight: 'black' }}

        const fetchTurkishStockPrice = async (ticker) => {
            if (!ticker) return null;
            let symbol = ticker.split(' ')[0].toUpperCase().trim();
            symbol = symbol.replace(/[^A-Z0-9]/g, '');

            try {
                const res = await fetch('https://scanner.tradingview.com/turkey/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ symbols: { tickers: [`BIST:${symbol}`] }, query: { types: [] }, columns: ["close"] })
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.data && data.data.length > 0 && data.data[0].d && data.data[0].d.length > 0) {
                        return data.data[0].d[0];
                    }
                }
            } catch (e) {
                console.warn("TradingView fetch failed: ", e);
            }
            return null;
        };

        const PortfolioApp = () => {
            // TEMA YÖNETİMİ
            const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'dark');
            
            useEffect(() => {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                localStorage.setItem('theme', theme);
            }, [theme]);

            const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');

            const [appState, setAppState] = useState('loading_vault');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');

            const [githubConfig, setGithubConfig] = useState(() => {
                const saved = localStorage.getItem('gh_config_v3');
                return saved ? JSON.parse(saved) : { token: '', username: '', repo: '' };
            });
            const [formConfig, setFormConfig] = useState(githubConfig);

            const [fileSha, setFileSha] = useState(null);
            const [vaultPassword, setVaultPassword] = useState("");
            const [passwordInput, setPasswordInput] = useState("");
            const [authError, setAuthError] = useState("");
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

            const [rates, setRates] = useState({ USD: 32.50, EUR: 35.20, XAU: 2350, BANK_GRAM: 2450, GRAM: 2475, ATA: 17000, TRY: 1, STOCK: 1 });
            const [currencyLabels, setCurrencyLabels] = useState({ USD: 'Dolar', EUR: 'Euro', TRY: 'TL', XAU: 'Ons ($)', BANK_GRAM: 'Banka Gr', GRAM: 'Fiziki Gr', ATA: 'Ata', STOCK: 'Hisse' });

            const showToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast(prev => ({ ...prev, show: false })), 3000);
            };
            const [isLoadingRates, setIsLoadingRates] = useState(false);
            const [isSaving, setIsSaving] = useState(false);

            const [expandedPersons, setExpandedPersons] = useState({});
            const [expandedAssets, setExpandedAssets] = useState({});

            const [portfolio, setPortfolio] = useState([]);

            const setVaultSession = (pass) => {
                const expiry = new Date().getTime() + (30 * 60 * 1000);
                localStorage.setItem('vault_session_v4', JSON.stringify({ password: pass, expiry }));
            };
            const clearVaultSession = () => localStorage.removeItem('vault_session_v4');

            const isInitialMount = React.useRef(true);
            const skipNextSave = React.useRef(true);

            const debouncedSave = useDebounce((isAuto) => {
                handleSaveToGithub(isAuto);
            }, 2000);

            useEffect(() => {
                if (isInitialMount.current) {
                    isInitialMount.current = false;
                    return;
                }
                if (appState === 'app' && vaultPassword && !isSaving) {
                    if (skipNextSave.current) {
                        skipNextSave.current = false;
                        return;
                    }
                    const handler = setTimeout(() => {
                        debouncedSave(true);
                    }, 10);
                    return () => clearTimeout(handler);
                }
            }, [portfolio, currencyLabels]);

            useEffect(() => {
                if (appState !== 'app' || !portfolio.length) return;
                let updated = false;
                const newPortfolio = JSON.parse(JSON.stringify(portfolio));

                const processItems = async () => {
                    for (const person of newPortfolio) {
                        for (const asset of person.assets) {
                            if (asset.type === 'STOCK' && asset.name) {
                                const ticker = asset.name.split(' ')[0];
                                if (safeParseNum(asset.currentPrice) <= 0 || asset._lastFetchedTicker !== ticker) {
                                    const price = await fetchTurkishStockPrice(ticker);
                                    if (price) { asset.currentPrice = price; asset._lastFetchedTicker = ticker; updated = true; }
                                }
                            }
                            if (asset.subItems) {
                                for (const sub of asset.subItems) {
                                    if (sub.type === 'STOCK' && sub.name) {
                                        const ticker = sub.name.split(' ')[0];
                                        if (safeParseNum(sub.currentPrice) <= 0 || sub._lastFetchedTicker !== ticker) {
                                            const price = await fetchTurkishStockPrice(ticker);
                                            if (price) { sub.currentPrice = price; sub._lastFetchedTicker = ticker; updated = true; }
                                        }
                                    }
                                }
                            }
                        }
                    }
                    if (updated) setPortfolio(newPortfolio);
                };
                processItems();
            }, [portfolio, appState]);

            useEffect(() => {
                const init = () => {
                    const savedConfig = localStorage.getItem('gh_config_v5');
                    if (savedConfig) {
                        setGithubConfig(JSON.parse(savedConfig));
                        setAppState('enter_password');
                    } else {
                        localStorage.removeItem('gh_config_v4');
                        setAppState('setup_github');
                    }
                };
                init();
            }, []);

            const handleAuth = async (e) => {
                e.preventDefault();
                if (!passwordInput) { setAuthError("Şifre boş olamaz."); return; }
                setAuthError("");
                setIsLoadingRates(true);
                setAppState('loading_vault');
                try {
                    const cleanUser = githubConfig.username.trim();
                    const cleanRepo = githubConfig.repo.trim();
                    const cleanToken = githubConfig.token.replace(/[^\x20-\x7E]/g, '').trim();
                    const timestamp = new Date().getTime();

                    const response = await fetch(`https://api.github.com/repos/${cleanUser}/${cleanRepo}/contents/data.json?t=${timestamp}`, {
                        headers: { 'Authorization': `Bearer ${cleanToken}`, 'Accept': 'application/vnd.github.v3+json' }
                    });

                    if (response.status === 404) {
                        setAppState('set_password');
                        return;
                    }
                    if (!response.ok) throw new Error("GitHub erişim reddedildi.");

                    const data = await response.json();
                    setFileSha(data.sha);
                    const decodedContent = decodeURIComponent(escape(atob(data.content)));
                    const vaultData = JSON.parse(decodedContent);

                    if (vaultData.isEncrypted) {
                        let decryptedString;
                        try {
                            const vBytes = CryptoJS.AES.decrypt(vaultData.payload, passwordInput);
                            decryptedString = vBytes.toString(CryptoJS.enc.Utf8);
                        } catch (e) { throw new Error("Kasa Şifresi Yanlış"); }
                        if (!decryptedString) throw new Error("Kasa Şifresi Yanlış");

                        const parsedData = JSON.parse(decryptedString);
                        const finalPortfolio = Array.isArray(parsedData) ? parsedData : (parsedData.portfolio || []);
                        setPortfolio(finalPortfolio);

                        if (parsedData.labels && !Array.isArray(parsedData)) {
                            const lbls = parsedData.labels;
                            if (!lbls.STOCK) lbls.STOCK = 'Hisse';
                            if (!lbls.XAU) lbls.XAU = 'Ons ($)';
                            if (!lbls.BANK_GRAM) lbls.BANK_GRAM = 'Banka Gr';
                            setCurrencyLabels(lbls);
                        }

                        const expandedInit = {};
                        finalPortfolio.forEach(p => expandedInit[p.id] = true);
                        setExpandedPersons(expandedInit);
                    } else { throw new Error("Eski format kasa desteklenmiyor."); }

                    setVaultPassword(passwordInput);
                    setVaultSession(passwordInput);
                    setAppState('app');
                } catch (err) {
                    const errMsg = err.message || "";
                    if (errMsg.toLowerCase().includes('failed to fetch')) {
                        setAuthError("Ağa bağlanılamadı. İnternet bağlantınızı kontrol edin.");
                    } else {
                        setAuthError(errMsg || "Erişim Reddedildi.");
                    }
                    setAppState('enter_password');
                    setPasswordInput("");
                } finally {
                    setIsLoadingRates(false);
                }
            };

            const setupNewVault = (e) => {
                e.preventDefault();
                if (passwordInput.length < 4) { setAuthError("En az 4 hane olmalıdır."); return; }
                setVaultPassword(passwordInput);
                setVaultSession(passwordInput);
                setPortfolio([]);
                setAppState('app');
            };

            const handleSaveToGithub = async (isAutoSave = false) => {
                setIsSaving(true);
                try {
                    const jsonString = JSON.stringify({ portfolio, labels: currencyLabels });
                    const encryptedPayload = CryptoJS.AES.encrypt(jsonString, vaultPassword).toString();
                    const vaultPackage = { isEncrypted: true, lastUpdate: new Date().toISOString(), payload: encryptedPayload };
                    const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(vaultPackage, null, 2))));

                    const cleanToken = githubConfig.token.replace(/[^\x20-\x7E]/g, '').trim();
                    const response = await fetch(`https://api.github.com/repos/${githubConfig.username.trim()}/${githubConfig.repo.trim()}/contents/data.json`, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${cleanToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: isAutoSave ? "🤖 Oto-Kayıt" : "🔒 Kasa güncellendi", content: contentBase64, ...(fileSha ? { sha: fileSha } : {}) })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        setFileSha(data.content.sha);
                        setVaultSession(vaultPassword);
                        if (!isAutoSave) showToast("Kasa başarıyla senkronize edildi", "success");
                        setTimeout(() => setIsSaving(false), 800);
                    } else { throw new Error("Kayıt reddedildi."); }
                } catch (error) {
                    if (!isAutoSave) showToast("Kayıt Hatası! İnternet bağlantınızı veya ayarlarınızı kontrol edin.", "error");
                    setIsSaving(false);
                }
            };

            const saveGithubConfig = (e) => {
                e.preventDefault();
                const cleanedConfig = { username: formConfig.username.trim(), repo: formConfig.repo.trim(), token: formConfig.token.trim() };
                localStorage.setItem('gh_config_v5', JSON.stringify(cleanedConfig));
                window.location.reload();
            };

            const lockVault = () => {
                setVaultPassword(""); setPortfolio([]); clearVaultSession();
                setAppState('enter_password'); window.location.reload();
            };

            const disconnectGithub = () => {
                if (window.confirm("GitHub bağlantısını kesmek istediğinize emin misiniz?")) {
                    localStorage.removeItem('gh_config_v5'); window.location.reload();
                }
            };

            // --- CANLI VERİ ÇEKİMİ (BİNANCE & TRADINGVIEW KOMBİNASYONU) ---
            const fetchLiveRates = async (showLoading = false) => {
                try {
                    if (showLoading) setIsLoadingRates(true);
                    
                    const binancePromise = fetch('https://api.binance.com/api/v3/ticker/price?symbols=%5B%22USDTTRY%22,%22EURUSDT%22%5D').then(r => r.json());
                    const tvPromise = fetch('https://scanner.tradingview.com/global/scan', {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ symbols: { tickers: ["FX_IDC:XAUUSD"] }, query: { types: [] }, columns: ["close"] })
                    }).then(r => r.json());

                    const [binanceData, tvData] = await Promise.all([binancePromise, tvPromise]);
                    
                    let paxg = 0, usdtTry = 0, eurUsdt = 0;
                    
                    if (tvData && tvData.data && tvData.data.length > 0 && tvData.data[0].d) {
                        paxg = parseFloat(tvData.data[0].d[0]);
                    }

                    if (binanceData && Array.isArray(binanceData)) {
                        binanceData.forEach(item => {
                            if (item.symbol === 'USDTTRY') usdtTry = parseFloat(item.price);
                            if (item.symbol === 'EURUSDT') eurUsdt = parseFloat(item.price);
                        });
                    }

                    if (usdtTry > 0 && paxg > 0) {
                        setRates(prev => {
                            const newRates = { ...prev };
                            
                            newRates.USD = parseFloat(usdtTry.toFixed(2));
                            if (eurUsdt > 0) {
                                newRates.EUR = parseFloat((eurUsdt * usdtTry).toFixed(2));
                            }
                            
                            newRates.XAU = parseFloat(paxg.toFixed(2));
                            
                            const spotGramGoldTry = (paxg / 31.1034768) * usdtTry;
                            
                            newRates.BANK_GRAM = parseFloat(spotGramGoldTry.toFixed(2)); // Banka Gramı
                            
                            const physicalPremium = 1.01; // %1 Fiziki Kuyumcu primi
                            newRates.GRAM = parseFloat((spotGramGoldTry * physicalPremium).toFixed(2)); 
                            
                            newRates.ATA = parseFloat((newRates.GRAM * 6.88).toFixed(2));

                            saveRateToDB(newRates.XAU, newRates.GRAM);

                            return newRates;
                        });
                    }
                } catch (err) {
                    console.error("Fiyat çekme hatası", err);
                } finally { 
                    if (showLoading) setIsLoadingRates(false); 
                }
            };
            
            // OTONOM (2 Saniyede bir) ÇALIŞTIRMA
            useEffect(() => {
                if (appState === 'app') {
                    fetchLiveRates(true); 
                    const interval = setInterval(() => {
                        fetchLiveRates(false); 
                    }, 2000);
                    return () => clearInterval(interval);
                }
            }, [appState]);

            const handleRateChange = (currency, value) => { setRates(prev => ({ ...prev, [currency]: parseFloat(value) || 0 })); };

            const safeParseNum = (val) => {
                if (val === "" || val === null || val === undefined) return 0;
                const num = parseFloat(val);
                return isNaN(num) ? 0 : num;
            };

            const calculateAssetValue = (asset) => {
                if (asset.subItems && asset.subItems.length > 0) {
                    return asset.subItems.reduce((total, sub) => {
                        const rate = sub.type === 'STOCK' ? (safeParseNum(sub.currentPrice) || safeParseNum(sub.costPrice) || 0) : (rates[sub.type] || 1);
                        return total + (safeParseNum(sub.amount) * rate);
                    }, 0);
                }
                const rate = asset.type === 'STOCK' ? (safeParseNum(asset.currentPrice) || safeParseNum(asset.costPrice) || 0) : (rates[asset.type] || 1);
                return safeParseNum(asset.amount) * rate;
            };

            const calculatePnL = (amount, rate, costPrice, type, currentPrice) => {
                const cost = safeParseNum(costPrice);
                const qty = safeParseNum(amount);
                if (cost <= 0 || qty <= 0) return null;
                
                let currentTotal;
                if (type === 'STOCK') {
                    const price = safeParseNum(currentPrice);
                    if (price <= 0) return null; 
                    currentTotal = qty * price;
                } else {
                    currentTotal = qty * rate;
                }
                
                const costTotal = qty * cost; 
                const profit = currentTotal - costTotal;
                const percentage = (profit / costTotal) * 100;
                return { profit, percentage, isProfit: profit >= 0, isNeutral: Math.abs(profit) < 0.01 };
            };

            const calculatePersonTotal = (assets) => assets.reduce((total, asset) => total + calculateAssetValue(asset), 0);

                const tryEquivalent = { TRY: 0, USD: 0, EUR: 0, XAU: 0, BANK_GRAM: 0, GRAM: 0, ATA: 0, STOCK: 0 };
                visiblePortfolio.forEach(person => {
                    person.assets.forEach(asset => {

                            asset.subItems.forEach(sub => {
                                const rate = sub.type === 'STOCK' ? (safeParseNum(sub.currentPrice) || safeParseNum(sub.costPrice) || 0) : (rates[sub.type] || 1);
                                const value = safeParseNum(sub.amount) * rate;
                                tryEquivalent[sub.type] = (tryEquivalent[sub.type] || 0) + value;
                            });
                        } else {
                            const rate = asset.type === 'STOCK' ? (safeParseNum(asset.currentPrice) || safeParseNum(asset.costPrice) || 0) : (rates[asset.type] || 1);
                            const value = safeParseNum(asset.amount) * rate;
                            tryEquivalent[asset.type] = (tryEquivalent[asset.type] || 0) + value;
                        }

                    .filter(key => tryEquivalent[key] > 0)
                    .map(key => ({
                        type: key,
                        label: currencyLabels[key] || key,
                        value: tryEquivalent[key],

                    }))

                                                {person.isHidden && <span className="text-[9px] text-red-500/80 dark:text-red-400/80 uppercase tracking-wider font-semibold mt-0.5">Gizlendi</span>}
                                            </div>
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 transition-transform duration-300 ml-1 ${isOpen ? 'bg-slate-800 dark:bg-white text-white dark:text-black rotate-180' : 'glass-surface text-slate-500 dark:text-zinc-400'}`}>
                                                <i className="fa-solid fa-chevron-down text-xs"></i>
                                            </div>
                                        </div>
                                    </div>

                                    <div className={`accordion-content ${isOpen ? 'open' : ''}`}>
                                        <div className="px-4 sm:px-6 pb-6 pt-2 flex flex-col gap-4 border-t border-black/5 dark:border-white/5">
                                            {person.assets.map((asset) => {
                                                const hasSubItems = asset.subItems && asset.subItems.length > 0;
                                                const assetValue = calculateAssetValue(asset);
                                                const isAssetOpen = expandedAssets[asset.id];

                                                return (
                                                    <div key={asset.id} className="glass-surface rounded-2xl border border-transparent hover:border-black/5 dark:hover:border-white/10 transition-all flex flex-col">

                                                        <div onClick={() => toggleAssetAccordion(asset.id)} className="p-4 flex justify-between items-center cursor-pointer hover:bg-black/5 dark:hover:bg-white/5 rounded-t-2xl transition-colors group">
                                                            <div className="flex items-center gap-2 flex-1 min-w-0 pr-2">
                                                                <div className="w-7 h-7 rounded-full bg-slate-200 dark:bg-black/30 flex items-center justify-center shrink-0 group-hover:bg-emerald-100 dark:group-hover:bg-emerald-500/20 transition-colors">
                                                                    <i className="fa-solid fa-wallet text-slate-400 dark:text-zinc-400 text-[10px] group-hover:text-emerald-600 dark:group-hover:text-emerald-400"></i>
                                                                </div>
                                                                <DebouncedInput
                                                                    as="textarea"
                                                                    rows={1}
                                                                    value={asset.name}
                                                                    onChange={(val) => updatePortfolioAsset(person.id, asset.id, a => ({ ...a, name: val }))}
                                                                    onClick={(e) => e.stopPropagation()}
                                                                    onInput={(e) => { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; }}
                                                                    title={asset.name}
                                                                    className="flex-1 min-w-0 bg-transparent font-bold text-slate-800 dark:text-white text-xs sm:text-sm outline-none placeholder:text-slate-400 dark:placeholder:text-zinc-500 resize-none overflow-hidden"
                                                                    style={{ minHeight: '20px', paddingTop: '2px' }}
                                                                    placeholder="KURUM / VARLIK ADI"
                                                                />
                                                                {asset.type === 'STOCK' && (
                                                                    <button 
                                                                        onClick={(e) => { e.stopPropagation(); forceFetchStockPrice(person.id, asset.id); }}
                                                                        className="p-1.5 rounded-lg text-emerald-600 dark:text-emerald-400/80 hover:bg-emerald-100 dark:hover:bg-emerald-500/20 transition-colors shrink-0"
                                                                        title="Canlı Fiyatı Çek"
                                                                    >
                                                                        <i className="fa-solid fa-rotate-right text-[12px]"></i>
                                                                    </button>
                                                                )}
                                                            </div>
                                                            <div className="flex items-center gap-3 shrink-0">
                                                                <div className="text-right">
                                                                    <span className="text-sm font-bold font-numbers text-emerald-600 dark:text-emerald-400">{formatMoney(assetValue)}</span>
                                                                    {hasSubItems && !isAssetOpen && <div className="text-[9px] text-slate-500 dark:text-zinc-500 font-semibold tracking-widest uppercase mt-0.5">{asset.subItems.length} Kalem</div>}
                                                                </div>
                                                                <div className={`w-6 h-6 rounded-full flex items-center justify-center shrink-0 transition-transform duration-300 ${isAssetOpen ? 'bg-slate-300 dark:bg-white/20 text-slate-800 dark:text-white rotate-180' : 'text-slate-400 dark:text-zinc-500 group-hover:bg-slate-200 dark:group-hover:bg-white/10'}`}>
                                                                    <i className="fa-solid fa-chevron-down text-[10px]"></i>
                                                                </div>
                                                                <button onClick={(e) => removeAsset(e, person.id, asset.id)} className="text-slate-400 dark:text-zinc-500 hover:text-red-500 opacity-60 hover:opacity-100 p-1.5 rounded-lg z-20 relative ml-1 transition-colors"><i className="fa-solid fa-trash text-[11px]"></i></button>
                                                            </div>
                                                        </div>

                                                        <div className={`accordion-content ${isAssetOpen ? 'open' : ''}`}>
                                                            <div className="p-4 pt-1 flex flex-col gap-4 border-t border-black/5 dark:border-white/5">

                                                                <div className="flex flex-col gap-3">
                                                                    {!hasSubItems ? (
                                                                        <div className="flex flex-col gap-1 w-full relative z-[100]">
                                                                            <div className="flex bg-white/60 dark:bg-black/40 border border-slate-200 dark:border-white/10 rounded-xl focus-within:border-emerald-500/50 transition-colors w-full relative shadow-sm">
                                                                                <DebouncedInput
                                                                                    type="number"
                                                                                    value={asset.amount}
                                                                                    onChange={(val) => updatePortfolioAsset(person.id, asset.id, a => ({ ...a, amount: val }))}
                                                                                    className="flex-[2.5] min-w-0 bg-transparent text-slate-900 dark:text-white font-numbers font-bold text-sm py-2 px-1 text-center outline-none"
                                                                                    placeholder={asset.type === 'STOCK' ? "Adet" : "Miktar"}
                                                                                />
                                                                                <div className="w-[1px] bg-slate-200 dark:bg-white/10"></div>
                                                                                
                                                                                {asset.type === 'STOCK' && (
                                                                                    <>
                                                                                        <DebouncedInput
                                                                                            type="number"
                                                                                            value={asset.currentPrice || ''}
                                                                                            onChange={(val) => updatePortfolioAsset(person.id, asset.id, a => ({ ...a, currentPrice: val }))}
                                                                                            className="flex-[2.5] min-w-0 bg-transparent text-blue-600 dark:text-blue-200 font-numbers font-bold text-sm py-2 px-1 text-center outline-none border-r border-slate-200 dark:border-white/10 placeholder:text-blue-400 dark:placeholder:text-blue-500/50"
                                                                                            placeholder="Güncel"
                                                                                            title="Güncel Fiyat (₺)"
                                                                                        />
                                                                                    </>
                                                                                )}

                                                                                <DebouncedInput
                                                                                    type="number"
                                                                                    value={asset.costPrice || ''}
                                                                                    onChange={(val) => updatePortfolioAsset(person.id, asset.id, a => ({ ...a, costPrice: val }))}
                                                                                    className="flex-[2.5] min-w-0 bg-transparent text-emerald-600 dark:text-emerald-100 font-numbers font-bold text-sm py-2 px-1 text-center outline-none border-r border-slate-200 dark:border-white/10"
                                                                                    placeholder="Maliyet"
                                                                                />
                                                                                <CustomSelect
                                                                                    value={asset.type}
                                                                                    options={currencyLabels}
                                                                                    onChange={(newVal) => updatePortfolioAsset(person.id, asset.id, a => {
                                                                                        const isBlankOrLabel = !a.name || Object.values(currencyLabels).includes(a.name) || Object.keys(currencyLabels).includes(a.name);
                                                                                        return { ...a, type: newVal, name: isBlankOrLabel ? currencyLabels[newVal] : a.name };
                                                                                    })}
                                                                                    className="flex-[1.5] bg-slate-100 dark:bg-black/30 text-slate-700 dark:text-zinc-300 min-w-[55px] rounded-r-xl"
                                                                                />
                                                                            </div>

                                                                            {asset.costPrice && asset.type !== 'TRY' && (() => {
                                                                                const pnl = calculatePnL(asset.amount, rates[asset.type], asset.costPrice, asset.type, asset.currentPrice);
                                                                                if (!pnl) return null;
                                                                                return (
                                                                                    <div className="flex justify-end pr-1 mt-0.5">
                                                                                        <span className={`text-[10px] font-bold tracking-widest px-1.5 py-0.5 rounded-md ${pnl.isNeutral ? 'bg-slate-200 dark:bg-zinc-500/20 text-slate-500 dark:text-zinc-400' : pnl.isProfit ? 'bg-emerald-100 dark:bg-emerald-500/20 text-emerald-600 dark:text-emerald-400' : 'bg-red-100 dark:bg-red-500/20 text-red-600 dark:text-red-400'}`}>
                                                                                            {pnl.isNeutral ? '' : pnl.isProfit ? '+' : ''}{pnl.percentage.toFixed(1)}% ({formatMoney(pnl.profit)})
                                                                                        </span>
                                                                                    </div>
                                                                                );
                                                                            })()}
                                                                        </div>
                                                                    ) : null}

                                                                </div>

                                                                {hasSubItems && (
                                                                    <div className="flex flex-col gap-2 pl-2 border-l-2 border-slate-200 dark:border-white/10 ml-2 mt-1 mb-2">
                                                                        {asset.subItems.map((sub) => (
                                                                            <div key={sub.id} className="flex flex-col gap-2 bg-slate-50 dark:bg-black/20 p-2.5 rounded-xl border border-slate-200 dark:border-white/5 relative shadow-sm">
                                                                                <div className="flex items-center justify-between gap-2">
                                                                                    <div className="flex items-center gap-2 flex-1 min-w-0">
                                                                                        <DebouncedInput
                                                                                            type="text"
                                                                                            value={sub.name}
                                                                                            onChange={(val) => updateSubItem(person.id, asset.id, sub.id, 'name', val)}
                                                                                            className="bg-transparent py-1 px-1 rounded-md text-xs font-semibold text-slate-800 dark:text-zinc-200 outline-none flex-1 min-w-0 placeholder:text-slate-400 dark:placeholder:text-zinc-600 focus:bg-white dark:focus:bg-white/5 transition-colors"
                                                                                            placeholder="Kalem Adı"
                                                                                        />
                                                                                        {sub.type === 'STOCK' && (
                                                                                            <button 
                                                                                                onClick={(e) => { e.stopPropagation(); forceFetchStockPrice(person.id, asset.id, sub.id); }}
                                                                                                className="p-1 rounded-md text-emerald-600 dark:text-emerald-400/80 hover:bg-emerald-100 dark:hover:bg-emerald-500/20 transition-colors shrink-0"
                                                                                            >
                                                                                                <i className="fa-solid fa-rotate-right text-[12px]"></i>
                                                                                            </button>
                                                                                        )}
                                                                                    </div>
                                                                                    <button onClick={(e) => { e.stopPropagation(); removeSubItem(person.id, asset.id, sub.id); }} className="text-slate-400 dark:text-zinc-500 hover:text-red-500 p-1.5 rounded-md transition-colors"><i className="fa-solid fa-trash text-[10px]"></i></button>
                                                                                </div>

                                                                                <div className="flex flex-col gap-1 w-full relative z-[100]">
                                                                                    <div className="flex bg-white dark:bg-transparent border border-slate-200 dark:border-white/10 rounded-lg focus-within:border-slate-400 dark:focus-within:border-white/30 transition-colors w-full relative">
                                                                                        <DebouncedInput
                                                                                            type="number"
                                                                                            value={sub.amount}
                                                                                            onChange={(val) => updateSubItem(person.id, asset.id, sub.id, 'amount', val)}
                                                                                            className="flex-[2.5] min-w-0 bg-transparent text-slate-900 dark:text-white font-numbers font-bold text-xs py-2 px-1 text-center outline-none"
                                                                                            placeholder={sub.type === 'STOCK' ? 'Adet' : 'Miktar'}
                                                                                        />
                                                                                        <div className="w-[1px] bg-slate-200 dark:bg-white/10"></div>
                                                                                        
                                                                                        {sub.type === 'STOCK' && (
                                                                                            <>
                                                                                                <DebouncedInput
                                                                                                    type="number"
                                                                                                    value={sub.currentPrice || ''}
                                                                                                    onChange={(val) => updateSubItem(person.id, asset.id, sub.id, 'currentPrice', val)}
                                                                                                    className="flex-[2.5] min-w-0 bg-transparent text-blue-600 dark:text-blue-200 font-numbers font-bold text-xs py-2 px-1 text-center outline-none border-r border-slate-200 dark:border-white/10 placeholder:text-blue-400 dark:placeholder:text-blue-500/50"
                                                                                                    placeholder="Güncel"
                                                                                                />
                                                                                            </>
                                                                                        )}

                                                                                        <DebouncedInput
                                                                                            type="number"
                                                                                            value={sub.costPrice || ''}
                                                                                            onChange={(val) => updateSubItem(person.id, asset.id, sub.id, 'costPrice', val)}
                                                                                            className="flex-[2.5] min-w-0 bg-transparent text-emerald-600 dark:text-emerald-100 font-numbers font-bold text-xs py-2 px-1 text-center outline-none border-r border-slate-200 dark:border-white/10"
                                                                                            placeholder="Maliyet"
                                                                                        />
                                                                                        <CustomSelect
                                                                                            value={sub.type}
                                                                                            options={currencyLabels}
                                                                                            onChange={(newVal) => updateSubItem(person.id, asset.id, sub.id, 'type', newVal)}
                                                                                            className="flex-[1.5] bg-slate-100 dark:bg-black/30 text-slate-800 dark:text-white min-w-[55px] rounded-r-lg"
                                                                                        />
                                                                                    </div>

                                                                                    <div className="flex justify-between items-center pr-1 mt-0.5">
                                                                                        {assetValue > 0 ? (
                                                                                            <span className="text-[9.5px] font-semibold text-slate-400 dark:text-zinc-400 tracking-wide px-1">
                                                                                                %{( ( (sub.type === 'STOCK' ? (safeParseNum(sub.currentPrice) || rates.STOCK || 1) : (rates[sub.type] || 1)) * safeParseNum(sub.amount) / assetValue ) * 100).toFixed(1)} pay
                                                                                            </span>
                                                                                        ) : <span />}

                                                                                        {sub.costPrice && sub.type !== 'TRY' && (() => {
                                                                                            const pnl = calculatePnL(sub.amount, rates[sub.type], sub.costPrice, sub.type, sub.currentPrice);
                                                                                            if (!pnl) return null;
                                                                                            return (
                                                                                                <span className={`text-[9.5px] font-bold tracking-widest px-1.5 py-0.5 rounded-md ${pnl.isNeutral ? 'bg-slate-200 dark:bg-zinc-500/20 text-slate-500 dark:text-zinc-400' : pnl.isProfit ? 'bg-emerald-100 dark:bg-emerald-500/20 text-emerald-600 dark:text-emerald-400' : 'bg-red-100 dark:bg-red-500/20 text-red-600 dark:text-red-400'}`}>
                                                                                                    {pnl.isNeutral ? '' : pnl.isProfit ? '+' : ''}{pnl.percentage.toFixed(1)}% ({formatMoney(pnl.profit)})
                                                                                                </span>
                                                                                            );
                                                                                        })()}
                                                                                    </div>
                                                                                </div>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                )}

                                                                <button onClick={() => addSubItem(person.id, asset.id)} className="w-full text-[10px] text-slate-600 dark:text-zinc-300 hover:text-slate-900 dark:hover:text-white font-bold tracking-widest uppercase flex items-center justify-center gap-1.5 glass-surface px-4 py-2.5 rounded-xl transition-colors hover:bg-black/5 dark:hover:bg-white/5 border border-transparent hover:border-slate-300 dark:hover:border-white/10 mt-1 shadow-sm">
                                                                    <i className="fa-solid fa-plus text-[9px]"></i> Kalem Ekle
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}

                                            <div className="flex flex-row justify-between items-center gap-3 pt-4 border-t border-black/5 dark:border-white/5 mt-2 relative z-50">
                                                <button onClick={(e) => removePerson(e, person.id)} className="text-[10px] text-slate-500 dark:text-zinc-400 hover:text-red-500 font-bold uppercase tracking-widest px-5 py-3.5 glass-surface rounded-xl transition-all hover:bg-red-50 dark:hover:bg-red-500/10 hover:border-red-200 dark:hover:border-red-500/30 shrink-0 z-50 relative cursor-pointer shadow-sm">
                                                    KİŞİYİ SİL
                                                </button>
                                                <button onClick={() => addAsset(person.id)} className="flex-1 text-[10px] text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-500/10 border border-emerald-200 dark:border-emerald-500/20 font-bold uppercase tracking-widest py-3 rounded-xl hover:bg-emerald-500 hover:text-white dark:hover:text-black transition-all shadow-sm">
                                                    + YENİ VARLIK
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}

                        <div className="pt-2 pb-10">
                            <button onClick={addNewPerson} className="w-full py-10 border border-dashed border-slate-300 dark:border-white/20 hover:border-emerald-500/50 glass-card rounded-[2rem] text-[10px] font-bold uppercase tracking-widest text-slate-400 dark:text-zinc-400 hover:text-slate-800 dark:hover:text-white transition-all flex flex-col items-center gap-4 hover:bg-black/5 dark:hover:bg-white/5 group">
                                <div className="w-12 h-12 rounded-full glass-surface flex items-center justify-center group-hover:bg-emerald-500 group-hover:text-white dark:group-hover:text-black transition-colors shadow-sm">
                                    <i className="fa-solid fa-plus text-lg"></i>
                                </div>
                                YENİ PORTFÖY
                            </button>
                        </div>
                        </div>
                        </>
                    )}

                    {activeTab === 'scenario' && <GoldScenarioCalculator currentRates={rates} />}
                    {activeTab === 'goal' && <GoalSettingTab currentTotal={grandTotal} />}
                        
                    {/* SIDEBAR OVERLAY VE ÇEKMECE */}
                    <div className={`fixed inset-0 z-[200] transition-opacity duration-300 ${isSidebarOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                        <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setIsSidebarOpen(false)}></div>
                        
                        <div className={`absolute top-0 left-0 bottom-0 w-80 max-w-[85vw] glass-surface !bg-slate-50/95 dark:!bg-slate-900/95 border-r border-black/10 dark:border-white/10 shadow-2xl transition-transform duration-300 p-6 flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                            <div className="flex justify-between items-center mb-8">
                                <h2 className="text-xl font-black text-slate-800 dark:text-white flex items-center gap-3">
                                    <i className="fa-solid fa-layer-group text-emerald-500"></i> Menü
                                </h2>
                                <button onClick={() => setIsSidebarOpen(false)} className="w-8 h-8 rounded-full hover:bg-black/5 dark:hover:bg-white/10 flex items-center justify-center text-slate-500 dark:text-zinc-400 transition-colors">
                                    <i className="fa-solid fa-xmark text-lg"></i>
                                </button>
                            </div>
                            <div className="flex flex-col gap-3 mt-4">
                                <button 
                                    onClick={() => { setActiveTab('dashboard'); setIsSidebarOpen(false); }} 
                                    className={`flex items-center gap-4 w-full px-5 py-4 rounded-2xl font-bold transition-all border ${activeTab === 'dashboard' ? 'bg-slate-800 text-white dark:bg-white dark:text-black border-transparent shadow-md' : 'bg-transparent text-slate-600 dark:text-zinc-300 border-black/5 dark:border-white/5 hover:bg-black/5 dark:hover:bg-white/5'}`}
                                >
                                    <i className="fa-solid fa-chart-pie text-lg w-6"></i> Ana Sayfa
                                </button>
                                <button 
                                    onClick={() => { setActiveTab('scenario'); setIsSidebarOpen(false); }} 
                                    className={`flex items-center gap-4 w-full px-5 py-4 rounded-2xl font-bold transition-all border ${activeTab === 'scenario' ? 'bg-slate-800 text-white dark:bg-white dark:text-black border-transparent shadow-md' : 'bg-transparent text-slate-600 dark:text-zinc-300 border-black/5 dark:border-white/5 hover:bg-black/5 dark:hover:bg-white/5'}`}
                                >
                                    <i className="fa-solid fa-scale-balanced text-lg w-6"></i> Altın Senaryo
                                </button>
                                <button 
                                    onClick={() => { setActiveTab('goal'); setIsSidebarOpen(false); }} 
                                    className={`flex items-center gap-4 w-full px-5 py-4 rounded-2xl font-bold transition-all border ${activeTab === 'goal' ? 'bg-slate-800 text-white dark:bg-white dark:text-black border-transparent shadow-md' : 'bg-transparent text-slate-600 dark:text-zinc-300 border-black/5 dark:border-white/5 hover:bg-black/5 dark:hover:bg-white/5'}`}
                                >
                                    <i className="fa-solid fa-bullseye text-lg w-6"></i> Hedef Belirleme
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PortfolioApp />);
    </script>
</body>

</html>
